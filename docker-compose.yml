services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag-network

  fastapi:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rag-fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      DATA_DIR: /data
      STORAGE_DIR: /data/storage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIM_FALLBACK: ${EMBEDDING_DIM_FALLBACK:-1024}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DOMAIN_ALLOWED: ${DOMAIN_ALLOWED:-cd2.com.br}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      PUBLICADOR_EMAILS: ${PUBLICADOR_EMAILS:-}
      ALLOW_ANONYMOUS_CHAT: ${ALLOW_ANONYMOUS_CHAT:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./data:/data
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 1800s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rag-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rag-open-webui
    environment:
      WEBUI_NAME: ""
      OPENAI_API_BASE_URL: http://fastapi:8000/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me}
      DEFAULT_USER_ROLE: user
      ENABLE_SIGNUP: "true"
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
      - ./docker/open-webui/custom.css:/app/build/static/custom.css:ro
      - "./Identidade Visual (Rebranding) CD2_Identidade Visual (Logo V1 Negativa) CD2-05.png:/app/build/static/logo.png:ro"
      - "./logo light minor.png:/app/build/static/favicon.png:ro"
      - "./logo dark minor.png:/app/build/static/favicon-dark.png:ro"
      - "./logo para dark minor.png:/app/build/static/logo-dark.png:ro"
      - "./Identidade Visual (Rebranding) CD2_Identidade Visual (Logo V1 Negativa) CD2 cópia.png:/app/build/static/logo-dark-full.png:ro"
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - rag-network

volumes:
  postgres_data:
  qdrant_data:
  openwebui_data:
  hf_cache:

networks:
  rag-network:
    driver: bridge

